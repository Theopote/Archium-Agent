name: Windows Smoke

# Real-machine validation on windows-latest (not every PR).
# Covers PptxGen, checkpoint lifecycle, Unicode/spaced paths, and basic Golden export.

on:
  schedule:
    # 02:00 UTC daily (~10:00 Asia/Shanghai)
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      python_version:
        description: Python version
        required: false
        default: "3.12"
        type: choice
        options:
          - "3.11"
          - "3.12"
  push:
    tags:
      - "v*"

concurrency:
  group: windows-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-smoke:
    name: windows smoke (py ${{ matrix.python-version }})
    runs-on: windows-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.python_version || matrix.python-version }}
          cache: pip

      - name: Install Python dependencies
        run: pip install -e ".[full,dev]"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: archium/infrastructure/renderers/pptxgen/package-lock.json

      - name: Install PptxGenJS dependencies
        working-directory: archium/infrastructure/renderers/pptxgen
        run: npm ci

      - name: Windows platform smoke tests
        run: pytest tests/smoke/test_windows_platform.py -v --tb=short

      - name: Upload Windows PptxGen artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-smoke-pptxgen
          path: tests/smoke/artifacts/
          if-no-files-found: ignore
          retention-days: 14
