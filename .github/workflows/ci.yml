name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check archium tests

      - name: Mypy
        run: mypy archium

      - name: Pytest
        run: pytest --cov=archium --cov-report=term-missing

      - name: Upload golden case artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-artifacts-py${{ matrix.python-version }}
          path: tests/golden/artifacts/
          if-no-files-found: ignore
