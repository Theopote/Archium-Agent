name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Security audit: report-only until observation ends, then block on high/critical.
  # Set SECURITY_AUDIT_ENFORCE=true to enforce early after triage (see docs/ci-security-audit.md).
  SECURITY_AUDIT_ENFORCE: "false"
  SECURITY_AUDIT_ENFORCE_AFTER: "2026-08-08"

jobs:
  test:
    name: test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          PYTAG=$(echo "${{ matrix.python-version }}" | tr -d .)
          pip install -r "requirements/full-py${PYTAG}.lock"
          pip install -e ".[dev]" --constraint "requirements/full-py${PYTAG}.lock"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: archium/infrastructure/renderers/pptxgen/package-lock.json

      - name: Install PptxGenJS dependencies
        working-directory: archium/infrastructure/renderers/pptxgen
        run: npm ci

      - name: Install fonts for layout text measurement
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk fonts-liberation

      - name: Ruff
        run: ruff check archium tests

      - name: Config reference sync
        run: python scripts/generate_config_docs.py --check

      - name: Mypy
        run: mypy archium --python-version ${{ matrix.python-version }}

      - name: Pytest (unit)
        run: pytest -m unit --cov=archium --cov-report=term-missing --cov-report=xml --cov-fail-under=65

      - name: Pytest (integration)
        run: pytest -m "integration and not e2e" --cov=archium --cov-append --cov-report=xml -v

      - name: Critical module coverage gate
        run: python scripts/ci_critical_coverage_gate.py

      - name: Pytest (benchmark)
        run: pytest -m benchmark -v

      - name: Pytest (golden regression)
        run: pytest tests/golden/regression tests/golden/mission tests/golden/fixtures -v

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-archium
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: PptxGen smoke test
        env:
          ARCHIUM_SMOKE_ARTIFACT_DIR: tests/smoke/artifacts
        run: pytest tests/smoke/test_pptxgen_render.py -v

      - name: Upload golden case artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-artifacts-py${{ matrix.python-version }}
          path: tests/golden/artifacts/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload PptxGen smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pptxgen-smoke-py${{ matrix.python-version }}
          path: tests/smoke/artifacts/
          if-no-files-found: ignore
          retention-days: 7

  marp-export:
    name: marp export smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements/full-py312.lock
          pip install -e ".[dev]" --constraint requirements/full-py312.lock

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      - name: Verify Marp CLI
        run: marp --version

      - name: Marp export smoke test
        env:
          ARCHIUM_SMOKE_ARTIFACT_DIR: tests/smoke/artifacts
        run: pytest tests/smoke/test_marp_export.py -v

      - name: Golden visual regression
        run: pytest tests/golden/visual/test_visual_regression.py -v

      - name: Upload Marp smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marp-smoke
          path: tests/smoke/artifacts/
          if-no-files-found: ignore
          retention-days: 7

  layout-pptx-screenshot:
    name: layout pptx screenshot regression
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements/full-py312.lock
          pip install -e ".[dev]" --constraint requirements/full-py312.lock

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: archium/infrastructure/renderers/pptxgen/package-lock.json

      - name: Install PptxGenJS dependencies
        working-directory: archium/infrastructure/renderers/pptxgen
        run: npm ci

      - name: Install screenshot tools (LibreOffice + Poppler)
        run: sudo apt-get update && sudo apt-get install -y libreoffice poppler-utils

      # PptxGen theme requests Microsoft YaHei; without Noto + fontconfig aliases,
      # LibreOffice PDF export draws Chinese as tofu and candidates are unusable.
      - name: Install CJK fonts for LibreOffice screenshot render
        run: bash scripts/ci_setup_screenshot_fonts.sh

      - name: Composition JSON golden cases (preview_visual_regression)
        run: pytest tests/golden/visual/composition/test_golden_cases.py -v -m preview_visual_regression

      - name: LayoutPlan PPTX screenshot regression (pptx_visual_regression)
        run: pytest tests/golden/visual/composition/test_pptx_screenshot_regression.py -v -m pptx_visual_regression

      - name: Upload screenshot baselines
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: layout-pptx-screenshot-baselines
          path: |
            tests/golden/visual/composition/**/pptx_screenshot.png
            tests/golden/visual/composition/**/pptx_screenshot_manifest.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload screenshot candidates (for human approve-baseline)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: layout-pptx-screenshot-candidates
          path: |
            tests/golden/visual/composition/**/candidates/**
          if-no-files-found: ignore
          retention-days: 14

  architectural-benchmark-render:
    name: architectural benchmark render pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements/full-py312.lock
          pip install -e ".[dev]" --constraint requirements/full-py312.lock

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: archium/infrastructure/renderers/pptxgen/package-lock.json

      - name: Install PptxGenJS dependencies
        working-directory: archium/infrastructure/renderers/pptxgen
        run: npm ci

      - name: Install screenshot tools (LibreOffice + Poppler)
        run: sudo apt-get update && sudo apt-get install -y libreoffice poppler-utils

      - name: Install CJK fonts for LibreOffice screenshot render
        run: bash scripts/ci_setup_screenshot_fonts.sh

      - name: Materialize curated benchmark assets
        run: python scripts/materialize_benchmark_curated_assets.py --force --sync-cases

      - name: Render architectural benchmark visuals
        # Ephemeral CI workspace only — regenerates sample renders for pipeline smoke + artifacts.
        # Local golden updates still require an explicit --write-goldens / UPDATE_* env.
        run: python scripts/render_architectural_benchmark_visuals.py --write-goldens --case case_001_site_plan --case case_002_site_photos

      - name: Render pipeline tests
        run: pytest tests/benchmark/architectural_slides/test_render_pipeline.py -v

      - name: Upload benchmark render artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architectural-benchmark-render-sample
          path: |
            tests/benchmark/architectural_slides/case_001_site_plan/output.pptx
            tests/benchmark/architectural_slides/case_001_site_plan/final_render.png
            tests/benchmark/architectural_slides/case_001_site_plan/render_manifest.json
            tests/benchmark/architectural_slides/case_002_site_photos/output.pptx
            tests/benchmark/architectural_slides/case_002_site_photos/final_render.png
            tests/benchmark/architectural_slides/case_002_site_photos/render_manifest.json
          if-no-files-found: ignore
          retention-days: 14

  migration-smoke:
    name: alembic migration smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements/full-py312.lock
          pip install -e ".[dev]" --constraint requirements/full-py312.lock

      - name: Alembic migration smoke test
        run: pytest tests/smoke/test_alembic_migration.py -v

  streamlit-smoke:
    name: streamlit startup smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements/full-py312.lock
          pip install -e ".[dev]" --constraint requirements/full-py312.lock

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Canvas Editor build smoke
        run: pytest tests/smoke/test_canvas_editor_build.py -v

      - name: Streamlit startup smoke test
        run: pytest tests/smoke/test_streamlit_startup.py -v

  security-scan:
    name: security audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Resolve enforcement mode
        id: security_gate
        run: |
          if [ "${{ env.SECURITY_AUDIT_ENFORCE }}" = "true" ]; then
            echo "enforce=true" >> "$GITHUB_OUTPUT"
          elif [ "$(date -u +%Y-%m-%d)" \>= "${{ env.SECURITY_AUDIT_ENFORCE_AFTER }}" ]; then
            echo "enforce=true" >> "$GITHUB_OUTPUT"
          else
            echo "enforce=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Security audit enforcement: $(grep enforce "$GITHUB_OUTPUT" | cut -d= -f2) (auto after ${{ env.SECURITY_AUDIT_ENFORCE_AFTER }})"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project and pip-audit
        run: |
          pip install -r requirements/full-py312.lock
          pip install -e ".[dev]" --constraint requirements/full-py312.lock
          pip install "pip-audit>=2.8"

      - name: pip-audit (full report)
        continue-on-error: true
        run: pip-audit --desc on 2>&1 | tee pip-audit-report.txt

      - name: pip-audit (high/critical gate)
        run: bash scripts/ci_security_audit_gate.sh "${{ steps.security_gate.outputs.enforce }}" pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: archium/infrastructure/renderers/pptxgen/package-lock.json

      - name: Install PptxGenJS dependencies
        working-directory: archium/infrastructure/renderers/pptxgen
        run: npm ci

      - name: npm audit (full report)
        continue-on-error: true
        run: npm audit --omit=dev --prefix archium/infrastructure/renderers/pptxgen 2>&1 | tee npm-audit-report.txt

      - name: npm audit (high/critical gate)
        run: bash scripts/ci_security_audit_gate.sh "${{ steps.security_gate.outputs.enforce }}" npm --omit=dev --prefix archium/infrastructure/renderers/pptxgen

      - name: Upload security audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-reports
          path: |
            pip-audit-report.txt
            pip-audit-enforce.txt
            npm-audit-report.txt
            npm-audit-enforce.txt
          if-no-files-found: ignore
          retention-days: 7
