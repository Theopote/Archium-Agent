name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Security audit: report-only until observation ends, then block on high/critical.
  # Set SECURITY_AUDIT_ENFORCE=true to enforce early after triage (see docs/ci-security-audit.md).
  SECURITY_AUDIT_ENFORCE: "false"
  SECURITY_AUDIT_ENFORCE_AFTER: "2026-08-08"

jobs:
  test:
    name: test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[full,legacy,dev]"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: archium/infrastructure/renderers/pptxgen/package-lock.json

      - name: Install PptxGenJS dependencies
        working-directory: archium/infrastructure/renderers/pptxgen
        run: npm ci

      - name: Install fonts for layout text measurement
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk fonts-liberation

      - name: Ruff
        run: ruff check archium tests

      - name: Config reference sync
        run: python scripts/generate_config_docs.py --check

      - name: Mypy
        run: mypy archium --python-version ${{ matrix.python-version }}

      - name: Pytest
        run: pytest -m "not smoke" --cov=archium --cov-report=term-missing --cov-report=xml --cov-fail-under=65

      - name: Architectural slide benchmark quality gate
        run: pytest tests/benchmark/architectural_slides -v -m architectural_benchmark

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-archium
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: PptxGen smoke test
        run: pytest tests/smoke/test_pptxgen_render.py -v

      - name: Upload golden case artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-artifacts-py${{ matrix.python-version }}
          path: tests/golden/artifacts/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload PptxGen smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pptxgen-smoke-py${{ matrix.python-version }}
          path: tests/smoke/artifacts/
          if-no-files-found: ignore
          retention-days: 7

  marp-export:
    name: marp export smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[full,dev]"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      - name: Verify Marp CLI
        run: marp --version

      - name: Marp export smoke test
        run: pytest tests/smoke/test_marp_export.py -v

      - name: Golden visual regression
        run: pytest tests/golden/visual/test_visual_regression.py -v

      - name: Upload Marp smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marp-smoke
          path: tests/smoke/artifacts/
          if-no-files-found: ignore
          retention-days: 7

  layout-pptx-screenshot:
    name: layout pptx screenshot regression
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[full,dev]"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: archium/infrastructure/renderers/pptxgen/package-lock.json

      - name: Install PptxGenJS dependencies
        working-directory: archium/infrastructure/renderers/pptxgen
        run: npm ci

      - name: Install screenshot tools (LibreOffice + Poppler)
        run: sudo apt-get update && sudo apt-get install -y libreoffice poppler-utils

      - name: Bootstrap screenshot baselines when not committed
        run: |
          if [ ! -f tests/golden/visual/composition/v1_drawing_focus/pptx_screenshot.png ]; then
            echo "No committed baselines — generating in CI workspace (commit artifacts after review)"
            python scripts/update_layout_pptx_screenshot_baselines.py
          fi

      - name: LayoutPlan PPTX screenshot regression
        run: pytest tests/golden/visual/composition/test_pptx_screenshot_regression.py -v

      - name: Upload screenshot baselines
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: layout-pptx-screenshot-baselines
          path: |
            tests/golden/visual/composition/**/pptx_screenshot.png
            tests/golden/visual/composition/**/pptx_screenshot_manifest.json
          if-no-files-found: ignore
          retention-days: 14

  migration-smoke:
    name: alembic migration smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[full,dev]"

      - name: Alembic migration smoke test
        run: pytest tests/smoke/test_alembic_migration.py -v

  streamlit-smoke:
    name: streamlit startup smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[full,ui,dev]"

      - name: Streamlit startup smoke test
        run: pytest tests/smoke/test_streamlit_startup.py -v

  security-scan:
    name: security audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Resolve enforcement mode
        id: security_gate
        run: |
          if [ "${{ env.SECURITY_AUDIT_ENFORCE }}" = "true" ]; then
            echo "enforce=true" >> "$GITHUB_OUTPUT"
          elif [ "$(date -u +%Y-%m-%d)" \>= "${{ env.SECURITY_AUDIT_ENFORCE_AFTER }}" ]; then
            echo "enforce=true" >> "$GITHUB_OUTPUT"
          else
            echo "enforce=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Security audit enforcement: $(grep enforce "$GITHUB_OUTPUT" | cut -d= -f2) (auto after ${{ env.SECURITY_AUDIT_ENFORCE_AFTER }})"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project and pip-audit
        run: |
          pip install -e ".[full,dev]"
          pip install "pip-audit>=2.8"

      - name: pip-audit (full report)
        continue-on-error: true
        run: pip-audit --desc on 2>&1 | tee pip-audit-report.txt

      - name: pip-audit (high/critical gate)
        run: bash scripts/ci_security_audit_gate.sh "${{ steps.security_gate.outputs.enforce }}" pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: archium/infrastructure/renderers/pptxgen/package-lock.json

      - name: Install PptxGenJS dependencies
        working-directory: archium/infrastructure/renderers/pptxgen
        run: npm ci

      - name: npm audit (full report)
        continue-on-error: true
        run: npm audit --omit=dev --prefix archium/infrastructure/renderers/pptxgen 2>&1 | tee npm-audit-report.txt

      - name: npm audit (high/critical gate)
        run: bash scripts/ci_security_audit_gate.sh "${{ steps.security_gate.outputs.enforce }}" npm --omit=dev --prefix archium/infrastructure/renderers/pptxgen

      - name: Upload security audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-reports
          path: |
            pip-audit-report.txt
            pip-audit-enforce.txt
            npm-audit-report.txt
            npm-audit-enforce.txt
          if-no-files-found: ignore
          retention-days: 7
