name: E2E Benchmark Nightly

# Two explicit gates:
# - Pipeline Gate: deliverable chain (PPTX + screenshot count); validation may be bypassed.
# - Quality Gate: real LayoutValidationService scoring; no validation monkeypatch.
# PR CI runs integration tests with -m "integration and not e2e" only.

on:
  schedule:
    # 03:00 UTC daily (~11:00 Asia/Shanghai), after layout-pptx-screenshot window
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: e2e-benchmark-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-pipeline-gate:
    name: E2E Pipeline Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[full,dev]"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: archium/infrastructure/renderers/pptxgen/package-lock.json

      - name: Install PptxGenJS dependencies
        working-directory: archium/infrastructure/renderers/pptxgen
        run: npm ci

      - name: Install fonts for layout text measurement
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk fonts-liberation

      - name: Install screenshot tools (LibreOffice + Poppler)
        run: sudo apt-get install -y libreoffice poppler-utils

      - name: Run E2E Pipeline Gate
        run: pytest tests/integration/visual/test_e2e_pipeline_gate.py -v -m e2e_pipeline

      - name: Upload pipeline gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-pipeline-gate
          path: |
            output/visual-composition/**/*
            data/output/**/*
          if-no-files-found: ignore
          retention-days: 7

  e2e-quality-gate:
    name: E2E Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[full,dev]"

      - name: Install fonts for layout text measurement
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk fonts-liberation

      - name: Run E2E Quality Gate
        run: pytest tests/integration/visual/test_e2e_quality_gate.py -v -m e2e_quality
