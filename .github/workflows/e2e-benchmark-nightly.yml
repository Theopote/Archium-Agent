name: E2E Benchmark Nightly

# Full E2EBenchmarkService quality gate (content → visual workflow → PPTX → screenshots).
# Requires passed=True; not run on every PR (see ci.yml for wiring-only tests).

on:
  schedule:
    # 03:00 UTC daily (~11:00 Asia/Shanghai), after layout-pptx-screenshot window
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: e2e-benchmark-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-benchmark-quality-gate:
    name: e2e benchmark quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[full,legacy,dev]"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: archium/infrastructure/renderers/pptxgen/package-lock.json

      - name: Install PptxGenJS dependencies
        working-directory: archium/infrastructure/renderers/pptxgen
        run: npm ci

      - name: Install fonts for layout text measurement
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk fonts-liberation

      - name: Install screenshot tools (LibreOffice + Poppler)
        run: sudo apt-get install -y libreoffice poppler-utils

      - name: E2E Benchmark quality gate
        run: pytest tests/integration/visual/test_e2e_quality_gate.py -v -m e2e

      - name: Upload E2E benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-benchmark-nightly
          path: |
            output/visual-composition/**/*
            data/output/**/*
          if-no-files-found: ignore
          retention-days: 7
