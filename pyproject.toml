[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "archium-agent"
version = "0.2.0"
description = "Archium — intelligent architectural presentation production tool"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Proprietary" }
authors = [{ name = "Archium Team" }]
dependencies = [
    "openai>=1.0.0",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "python-dotenv>=1.0.0",
    "sqlalchemy>=2.0",
    "streamlit>=1.32.0",
]

[project.optional-dependencies]
ui = ["streamlit>=1.32.0"]
legacy = [
    "discord.py>=2.3.0",
    "plyer>=2.1.0",
    "watchdog>=4.0.0",
]
dev = [
    "alembic>=1.13",
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
    "mypy>=1.10",
    "types-Pillow",
]

[project.scripts]
archium = "main:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["archium*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-ra"
filterwarnings = ["ignore::DeprecationWarning"]

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["archium", "tests", "config.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["B008", "E501"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
check_untyped_defs = true
ignore_missing_imports = true
packages = ["archium"]

[[tool.mypy.overrides]]
module = ["main", "app", "config", "ppt_generator", "file_manager", "discord_watcher"]
ignore_errors = true
